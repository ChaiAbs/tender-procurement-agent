steps:
  # Build with Kaniko cache (no RAG store — mounted from GCS at runtime)
  - name: gcr.io/kaniko-project/executor:latest
    args:
      - --destination=australia-southeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/tender-agent:$COMMIT_SHA
      - --destination=australia-southeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/tender-agent:latest
      - --cache=true
      - --cache-ttl=168h
      - --cache-repo=australia-southeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/tender-agent/cache

  # Deploy to Cloud Run with GCS volume mount for RAG store
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud
    args:
      - run
      - deploy
      - tender-agent
      - --image=australia-southeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/tender-agent:$COMMIT_SHA
      - --region=australia-southeast1
      - --allow-unauthenticated
      - --memory=4Gi
      - --timeout=300
      - --set-secrets=ANTHROPIC_API_KEY=anthropic-api-key:latest
      - --add-volume=name=rag-store,type=cloud-storage,bucket=tender-agent-assets,mount-options=only-dir=rag_store
      - --add-volume-mount=volume=rag-store,mount-path=/app/rag_store
      - --add-volume=name=models,type=cloud-storage,bucket=tender-agent-assets,mount-options=only-dir=models
      - --add-volume-mount=volume=models,mount-path=/app/models
      - --add-volume=name=domain-rag,type=cloud-storage,bucket=tender-agent-assets,mount-options=only-dir=domain_rag_store
      - --add-volume-mount=volume=domain-rag,mount-path=/app/domain_rag_store

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_32
